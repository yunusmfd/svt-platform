<p>يحوّل الجهاز الهضمي الأغذية المعقّدة إلى <strong>مغذيات بسيطة</strong> قابلة للامتصاص. يبدأ الهضم في الفم (هضم ميكانيكي وكيميائي باللعاب) ويتواصل في المعدة والمعي الدقيق.</p>
<p>تلعب <strong>الأنزيمات الهضمية</strong> دوراً أساسياً في تبسيط الأغذية، ويتمّ امتصاص المغذيات أساساً على مستوى المعي الدقيق عبر الزغابات المعوية.</p>
