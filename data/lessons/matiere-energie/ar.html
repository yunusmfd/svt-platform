<p>تحرّر الخلية الطاقة الكامنة في <strong>المادة العضوية</strong> (الكليكوز خاصة) عبر تفاعلات الهدم. في حضور O₂ يحدث <strong>التنفس</strong> داخل الميتوكندري بمردود طاقي مرتفع، وفي غيابه يحدث <strong>التخمر</strong> بمردود ضعيف.</p>
<p>تُخزَّن الطاقة المحرَّرة في جزيئات <strong>ATP</strong> التي تستعملها الخلية في مختلف أنشطتها الحيوية.</p>
