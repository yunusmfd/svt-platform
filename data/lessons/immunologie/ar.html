<p>تواجه العضوية الأجسام الغريبة (<strong>مولّدات المضاد</strong>) عبر مناعة <strong>طبيعية (لانوعية)</strong> سريعة، ومناعة <strong>مكتسبة (نوعية)</strong> دقيقة تعتمد على اللمفاويات T و B.</p>
<p>تُنتج اللمفاويات B <strong>أجساماً مضادة</strong> تُبطل مفعول مولّدات المضاد، بينما تتدخّل اللمفاويات T في التعرّف والتخريب المباشر للخلايا المصابة.</p>
