<p>L'<strong>arbre généalogique</strong> permet de suivre la transmission d'un caractère à travers les générations et d'en déterminer le mode (dominant/récessif, lié ou non au sexe). Ces caractères suivent les <strong>lois de Mendel</strong>.</p>
