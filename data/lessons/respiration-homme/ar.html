<p>تتمّ المبادلات الغازية على مستوى <strong>الأسناخ الرئوية</strong>: ينتقل O₂ من الهواء إلى الدم، ويُطرح CO₂ من الدم إلى الهواء، بفضل البنية الرقيقة والمُوعّاة للأسناخ.</p>
