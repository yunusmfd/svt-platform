<p>تحمل <strong>الصبغيات</strong> الموجودة في نواة الخلية المعلومة الوراثية على شكل <strong>مورثات</strong>. تضمّ الخلية الجسمية للإنسان 46 صبغياً (23 زوجاً)، منها زوج الصبغيات الجنسية.</p>
<p>تنتقل الصفات الوراثية عبر <strong>الأمشاج</strong> (المنوية والبويضة)، حيث يحمل كل مشيج نصف العدد الصبغي (23 صبغياً)، فيُعاد العدد الكامل عند الإلقاح.</p>
